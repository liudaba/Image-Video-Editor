services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: videogen
      POSTGRES_USER: videogen
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U videogen"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 512m
    cpus: 1
    networks:
      - backend
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env} --maxmemory 64mb --maxmemory-policy allkeys-lru --appendonly yes
    expose:
      - "6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 128m
    cpus: 0.5
    networks:
      - backend
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  api:
    build: .
    restart: always
    env_file: .env
    environment:
      VIDEOGEN_ENV: production
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./keys:/app/keys
      - ./logs:/app/logs
      - ./app:/app/app
    mem_limit: 1g
    cpus: 2
    stop_grace_period: 45s
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - backend
      - frontend
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  backup:
    image: postgres:16-alpine
    restart: always
    environment:
      PGPASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set in .env}
    volumes:
      - ./backups:/backups
    entrypoint: >
      sh -c "while true; do
        pg_dump -h db -U videogen videogen | gzip > /backups/videogen_$$(date +%%Y%%m%%d_%%H%%M%%S).sql.gz;
        find /backups -name '*.sql.gz' -mtime +7 -delete;
        sleep 86400;
      done"
    depends_on:
      db:
        condition: service_healthy
    mem_limit: 256m
    cpus: 0.5
    networks:
      - backend
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

networks:
  backend:
    internal: true
  frontend:

volumes:
  pgdata:
  redisdata:
