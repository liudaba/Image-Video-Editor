version: "3.8"

services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: videogen
      POSTGRES_USER: videogen
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U videogen"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 512m
    cpus: 1

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}
    expose:
      - "6379"
    volumes:
      - redisdata:/data
    mem_limit: 128m
    cpus: 0.5

  api:
    build: .
    restart: always
    env_file: .env
    environment:
      VIDEOGEN_ENV: production
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./keys:/app/keys
      - ./logs:/app/logs
    mem_limit: 1g
    cpus: 2

volumes:
  pgdata:
  redisdata:
