<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>短视频生成器 - 管理后台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: "Microsoft YaHei", sans-serif;
            overflow-x: hidden;
        }
        .sidebar {
            width: 250px;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 100;
            padding-top: 60px;
            background-color: #2c3e50;
            color: white;
            transition: all 0.3s;
        }
        .sidebar .nav-link {
            color: #bdc3c7;
            padding: 15px 20px;
            margin: 10px 10px;
            border-radius: 5px;
            transition: all 0.3s;
        }
        .sidebar .nav-link:hover, .sidebar .nav-link.active {
            background-color: #34495e;
            color: #ecf0f1;
        }
        .sidebar .nav-link i {
            margin-right: 10px;
            width: 20px;
            text-align: center;
        }
        .main-content {
            margin-left: 250px;
            padding: 20px;
            transition: all 0.3s;
        }
        .top-navbar {
            position: fixed;
            top: 0;
            left: 250px;
            right: 0;
            height: 60px;
            background-color: #fff;
            border-bottom: 1px solid #dee2e6;
            z-index: 90;
            padding: 0 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.3s;
        }
        .page-header {
            margin-top: 70px;
            margin-bottom: 20px;
        }
        .stat-card {
            border-left: 4px solid;
            transition: transform 0.2s;
        }
        .stat-card:hover {
            transform: translateY(-3px);
        }
        .table-actions {
            display: flex;
            gap: 5px;
        }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .footer {
            margin-top: 40px;
            text-align: center;
            color: #7f8c8d;
            font-size: 0.9em;
        }
        .modal-confirm-danger .modal-footer .btn-primary {
            background-color: #dc3545;
            border-color: #dc3545;
        }
        .modal-confirm-danger .modal-footer .btn-primary:hover {
            background-color: #c82333;
            border-color: #bd2130;
        }
    </style>
</head>
<body>
    <nav class="top-navbar">
        <h4 class="mb-0">短视频生成器 - 管理后台</h4>
        <div class="d-flex align-items-center">
            <span class="me-3"><i class="fas fa-user-circle me-1"></i><span id="current-user">管理员</span></span>
            <button class="btn btn-outline-secondary btn-sm me-2" id="change-pwd-btn">
                <i class="fas fa-key"></i> 修改密码
            </button>
            <button class="btn btn-outline-danger btn-sm" id="logout-btn">
                <i class="fas fa-sign-out-alt"></i> 退出登录
            </button>
        </div>
    </nav>

    <nav class="sidebar">
        <div class="text-center py-4">
            <i class="fas fa-video fa-2x mb-2"></i>
            <h5>短视频生成器</h5>
        </div>
        <ul class="nav flex-column px-2">
            <li class="nav-item">
                <a class="nav-link active" href="#dashboard" data-section="dashboard">
                    <i class="fas fa-tachometer-alt"></i> 仪表盘
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="#users" data-section="users">
                    <i class="fas fa-users"></i> 用户管理
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="#licenses" data-section="licenses">
                    <i class="fas fa-key"></i> 许可证管理
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="#trial_codes" data-section="trial_codes">
                    <i class="fas fa-code"></i> 自动生成激活码
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="#versions" data-section="versions">
                    <i class="fas fa-cogs"></i> 版本管理
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="#orders" data-section="orders">
                    <i class="fas fa-shopping-cart"></i> 订单管理
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="#analytics" data-section="analytics">
                    <i class="fas fa-chart-line"></i> 数据分析
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="#audit_logs" data-section="audit_logs">
                    <i class="fas fa-clipboard-list"></i> 审计日志
                </a>
            </li>
        </ul>
        <div class="px-3 py-4 mt-4 border-top border-secondary">
            <small class="text-muted">当前版本: <span id="app-version">2.0.0</span></small>
        </div>
    </nav>

    <main class="main-content">
        <div id="content-area">
        </div>
        
        <div class="footer">
            <p>&copy; 2026 短视频生成器. 版权所有</p>
        </div>
    </main>

    <div class="modal fade" id="commonModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="commonModalLabel">提示</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body" id="commonModalBody">
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" id="confirmModalBtn">确认</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="logoutModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">确认退出</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <p>您确定要退出管理后台吗？</p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-danger" id="confirmLogoutBtn">确认退出</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="changePwdModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">修改密码</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="changePwdForm">
                        <div class="mb-3">
                            <label for="old-password" class="form-label">原密码</label>
                            <input type="password" class="form-control" id="old-password" required>
                        </div>
                        <div class="mb-3">
                            <label for="new-password" class="form-label">新密码</label>
                            <input type="password" class="form-control" id="new-password" required>
                        </div>
                        <div class="mb-3">
                            <label for="confirm-password" class="form-label">确认新密码</label>
                            <input type="password" class="form-control" id="confirm-password" required>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" id="confirmChangePwdBtn">确认修改</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let currentUser = null;
        let currentSection = '';

        document.addEventListener('DOMContentLoaded', function() {
            setupNavigation();
            setupLogout();
            setupChangePassword();
            loadDashboard();
            getCurrentUserInfo();
        });

        function setupNavigation() {
            document.querySelectorAll('[data-section]').forEach(link => {
                link.addEventListener('click', function(e) {
                    e.preventDefault();
                    
                    document.querySelectorAll('.nav-link').forEach(item => {
                        item.classList.remove('active');
                    });
                    
                    this.classList.add('active');
                    
                    const section = this.getAttribute('data-section');
                    loadSection(section);
                });
            });
        }

        function setupLogout() {
            document.getElementById('logout-btn').addEventListener('click', function() {
                const modal = new bootstrap.Modal(document.getElementById('logoutModal'));
                modal.show();
            });
            
            document.getElementById('confirmLogoutBtn').addEventListener('click', async function() {
                try {
                    await fetch('/auth/logout', { method: 'POST' });
                } catch(e) {}
                window.location.href = '/admin/login';
            });
        }

        function setupChangePassword() {
            document.getElementById('change-pwd-btn').addEventListener('click', function() {
                const modal = new bootstrap.Modal(document.getElementById('changePwdModal'));
                document.getElementById('changePwdForm').reset();
                modal.show();
            });
            
            document.getElementById('confirmChangePwdBtn').addEventListener('click', async function() {
                const oldPassword = document.getElementById('old-password').value;
                const newPassword = document.getElementById('new-password').value;
                const confirmPassword = document.getElementById('confirm-password').value;
                
                if (newPassword !== confirmPassword) {
                    showError('两次输入的新密码不一致');
                    return;
                }
                
                try {
                    const token = getAdminToken();
                    const csrfToken = getCsrfToken();
                    const headers = {
                        'Content-Type': 'application/x-www-form-urlencoded',
                        'Authorization': 'Bearer ' + token
                    };
                    if (csrfToken) {
                        headers['X-CSRF-Token'] = csrfToken;
                    }
                    const response = await fetch('/api/auth/admin/change-password', {
                        method: 'POST',
                        headers,
                        body: `old_password=${encodeURIComponent(oldPassword)}&new_password=${encodeURIComponent(newPassword)}`
                    });
                    
                    if (response.ok) {
                        showSuccess('密码修改成功，请重新登录');
                        await fetch('/auth/logout', { method: 'POST' });
                        setTimeout(() => {
                            window.location.href = '/admin/login';
                        }, 1500);
                    } else {
                        const error = await response.json();
                        showError(error.detail || '修改密码失败');
                    }
                } catch (error) {
                    showError('修改密码失败: ' + error.message);
                }
            });
        }

        function loadDashboard() {
            loadSection('dashboard');
        }

        async function loadSection(section) {
            if (currentSection === section) return;
            currentSection = section;
            
            const contentArea = document.getElementById('content-area');
            contentArea.innerHTML = '<div class="text-center mt-5"><div class="loading"></div><p class="mt-2">加载中...</p></div>';
            
            try {
                const response = await fetch(`/admin/content/${section}`);
                if (response.status === 401) {
                    window.location.href = '/admin/login';
                    return;
                }
                if (response.ok) {
                    contentArea.innerHTML = await response.text();
                    
                    const scripts = Array.from(contentArea.querySelectorAll('script'));
                    let loadChain = Promise.resolve();
                    for (const oldScript of scripts) {
                        loadChain = loadChain.then(() => new Promise((resolve, reject) => {
                            const newScript = document.createElement('script');
                            if (oldScript.src) {
                                newScript.src = oldScript.src;
                                newScript.onload = resolve;
                                newScript.onerror = reject;
                            } else {
                                newScript.textContent = oldScript.textContent;
                                resolve();
                            }
                            oldScript.parentNode.replaceChild(newScript, oldScript);
                            if (!oldScript.src) resolve();
                        }));
                    }
                    
                    await loadChain;

                    let initFunctionName;
                    if (section === 'trial_codes') {
                        initFunctionName = 'loadTrialCodesContent';
                    } else if (section === 'audit_logs') {
                        initFunctionName = 'loadAuditLogsContent';
                    } else {
                        initFunctionName = `load${section.charAt(0).toUpperCase() + section.slice(1)}Content`;
                    }
                    if (typeof window[initFunctionName] === 'function') {
                        setTimeout(() => {
                            window[initFunctionName]();
                        }, 10);
                    }
                } else {
                    contentArea.innerHTML = '<div class="alert alert-danger">加载内容失败</div>';
                }
            } catch (error) {
                contentArea.innerHTML = `<div class="alert alert-danger">加载内容失败: ${error.message}</div>`;
            }
        }

        async function getCurrentUserInfo() {
            try {
                const token = getAdminToken();
                const response = await fetch('/api/auth/profile', {
                    headers: {
                        'Authorization': 'Bearer ' + token
                    }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    currentUser = data;
                    document.getElementById('current-user').textContent = data.username;
                } else if (response.status === 401) {
                    window.location.href = '/admin/login';
                }
            } catch (error) {
                console.error('获取用户信息失败:', error);
            }
        }

        function getAdminToken() {
            const stored = localStorage.getItem('admin_token');
            if (stored) return stored;
            const match = document.cookie.match(/(?:^|;\s*)admin_session=([^;]*)/);
            return match ? decodeURIComponent(match[1]) : '';
        }

        function escapeHtml(str) {
            if (str === null || str === undefined) return '';
            const div = document.createElement('div');
            div.appendChild(document.createTextNode(String(str)));
            return div.innerHTML;
        }

        function showError(message) {
            alert('错误: ' + message);
        }

        function showSuccess(message) {
            alert('成功: ' + message);
        }

        function getCsrfToken() {
            const match = document.cookie.match(/(?:^|;\s*)csrf_token=([^;]*)/);
            return match ? decodeURIComponent(match[1]) : '';
        }

        async function apiRequest(url, options = {}) {
            const token = getAdminToken();
            const csrfToken = getCsrfToken();
            const headers = {
                'Content-Type': 'application/json',
                ...options.headers
            };
            if (token) {
                headers['Authorization'] = 'Bearer ' + token;
            }
            if (csrfToken && options.method && options.method !== 'GET') {
                headers['X-CSRF-Token'] = csrfToken;
            }

            try {
                const response = await fetch(url, {
                    ...options,
                    headers
                });

                if (response.status === 401) {
                    window.location.href = '/admin/login';
                    throw new Error('登录已过期，请重新登录');
                }

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.detail || '请求失败');
                }

                return await response.json();
            } catch (error) {
                console.error('API请求错误:', error);
                showError(error.message);
                throw error;
            }
        }

        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('zh-CN') + ' ' + date.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
        }
    </script>
</body>
</html>
