<div class="page-header">
    <h2>用户管理</h2>
    <p class="text-muted">管理系统中的所有用户</p>
</div>

<div class="card shadow mb-4">
    <div class="card-header py-3 d-flex flex-row align-items-center justify-content-between">
        <h6 class="m-0 font-weight-bold text-primary">用户列表</h6>
        <div class="dropdown no-arrow">
            <a class="dropdown-toggle" href="#" role="button" id="dropdownMenuLink" data-bs-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
                <i class="fas fa-ellipsis-v fa-sm fa-fw text-gray-400"></i>
            </a>
            <div class="dropdown-menu dropdown-menu-right shadow animated--fade-in" aria-labelledby="dropdownMenuLink">
                <div class="dropdown-header">操作:</div>
                <a class="dropdown-item" href="#" id="refresh-users">刷新列表</a>
            </div>
        </div>
    </div>
    <div class="card-body">
        <div class="table-responsive">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <div class="d-flex">
                    <div class="input-group input-group-sm me-2" style="width: 200px;">
                        <input type="text" class="form-control" placeholder="搜索用户名/邮箱" id="user-search">
                        <button class="btn btn-outline-secondary" type="button" id="search-users-btn">
                            <i class="fas fa-search"></i>
                        </button>
                    </div>
                    <div class="input-group input-group-sm" style="width: 150px;">
                        <select class="form-select" id="user-status-filter">
                            <option value="">所有状态</option>
                            <option value="active">活跃</option>
                            <option value="inactive">非活跃</option>
                        </select>
                    </div>
                </div>
                <div>
                    <button class="btn btn-sm btn-primary" id="add-user-btn">
                        <i class="fas fa-plus"></i> 添加用户
                    </button>
                    <button class="btn btn-sm btn-warning" id="batch-disable-btn" style="display:none">
                        <i class="fas fa-ban"></i> 批量禁用
                    </button>
                    <button class="btn btn-sm btn-success" id="batch-enable-btn" style="display:none">
                        <i class="fas fa-check"></i> 批量启用
                    </button>
                </div>
            </div>
            
            <table class="table table-bordered" id="users-table" width="100%" cellspacing="0">
                <thead>
                    <tr>
                        <th><input type="checkbox" id="select-all-users"></th>
                        <th>ID</th>
                        <th>用户名</th>
                        <th>邮箱</th>
                        <th>套餐</th>
                        <th>机器指纹</th>
                        <th>绑定设备</th>
                        <th>激活密钥</th>
                        <th>状态</th>
                        <th>最后在线</th>
                        <th>注册时间</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="users-list">
                    <!-- 动态加载 -->
                </tbody>
            </table>
            
            <nav aria-label="用户列表分页" class="mt-3">
                <ul class="pagination justify-content-center" id="users-pagination">
                    <!-- 分页按钮 -->
                </ul>
            </nav>
        </div>
    </div>
</div>

<script>
    // 当前分页状态
    let usersCurrentPage = 1;
    let usersPageSize = 10;
    let usersFilter = {};

    // 加载用户管理内容
    async function loadUsersContent() {
        await loadUsers(usersCurrentPage);
        
        // 绑定事件
        document.getElementById('refresh-users').addEventListener('click', () => {
            loadUsers(usersCurrentPage);
        });
        
        document.getElementById('search-users-btn').addEventListener('click', () => {
            usersCurrentPage = 1;
            loadUsers(usersCurrentPage);
        });
        
        document.getElementById('user-search').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                usersCurrentPage = 1;
                loadUsers(usersCurrentPage);
            }
        });
        
        document.getElementById('user-status-filter').addEventListener('change', () => {
            usersCurrentPage = 1;
            loadUsers(usersCurrentPage);
        });
        
        document.getElementById('add-user-btn').addEventListener('click', () => {
            showAddUserModal();
        });
        
        // 全选/取消全选
        document.getElementById('select-all-users').addEventListener('change', function() {
            document.querySelectorAll('.user-checkbox').forEach(cb => cb.checked = this.checked);
            updateBatchButtons();
        });
        
        // 批量禁用
        document.getElementById('batch-disable-btn').addEventListener('click', async () => {
            const ids = getSelectedUserIds();
            if (ids.length === 0) return;
            if (!confirm(`确定要禁用选中的 ${ids.length} 个用户吗？`)) return;
            await batchToggleUsers(ids, true);
        });
        
        // 批量启用
        document.getElementById('batch-enable-btn').addEventListener('click', async () => {
            const ids = getSelectedUserIds();
            if (ids.length === 0) return;
            if (!confirm(`确定要启用选中的 ${ids.length} 个用户吗？`)) return;
            await batchToggleUsers(ids, false);
        });
    }

    // 加载用户列表
    async function loadUsers(page = 1) {
        try {
            const search = document.getElementById('user-search').value.trim();
            const status = document.getElementById('user-status-filter').value;
            
            let queryParams = `?page=${page}&page_size=${usersPageSize}`;
            if (search) queryParams += `&search=${encodeURIComponent(search)}`;
            if (status) queryParams += `&status=${status}`;
            
            const response = await apiRequest(`/api/admin/users${queryParams}`);
            
            const usersList = document.getElementById('users-list');
            usersList.innerHTML = '';
            
            response.users.forEach(user => {
                const row = document.createElement('tr');
                if (!user.is_active) row.classList.add('table-secondary');
                const planTypeMap = {'trial_15d': '试用15天', 'monthly': '月付', 'quarterly': '季付', 'yearly': '年付', 'lifetime': '终身'};
                const planLabel = user.plan_type ? (planTypeMap[user.plan_type] || user.plan_type) : (user.license_type === 'pro' ? '专业版' : user.license_type === 'trial' ? '试用' : '未设置');
                const licValid = user.license_is_valid;
                const lastHb = user.last_heartbeat ? formatDate(user.last_heartbeat) : '-';
                const expiryStr = user.expiry_date ? formatDate(user.expiry_date) : (user.plan_type === 'lifetime' ? '永久' : '-');
                const machineFp = user.machine_fingerprint ? `<small title="${escapeHtml(user.machine_fingerprint)}">${escapeHtml(user.machine_fingerprint.substring(0, 12))}...</small>` : '-';
                const bindingsHtml = user.machine_bindings && user.machine_bindings.length > 0
                    ? user.machine_bindings.map(b => `<small title="${escapeHtml(b.fingerprint)}">${escapeHtml(b.machine_name || b.fingerprint.substring(0, 12))}...</small>`).join('<br>')
                    : '-';
                const keysHtml = user.activated_keys && user.activated_keys.length > 0
                    ? user.activated_keys.map(k => {
                        const planLabel = k.plan_type === 'monthly' ? '月付' : k.plan_type === 'quarterly' ? '季付' : k.plan_type === 'yearly' ? '年付' : k.plan_type === 'lifetime' ? '终身' : k.plan_type === 'trial_15d' ? '试用' : k.plan_type;
                        return `<small><code>${escapeHtml(k.license_key.substring(0, 12))}...</code> <button class="btn btn-sm btn-outline-secondary py-0 px-1" onclick="copyToClipboard('${escapeHtml(k.license_key)}')" title="复制完整密钥"><i class="fas fa-copy"></i></button> <span class="badge bg-info">${planLabel}</span></small>`;
                    }).join('<br>')
                    : '-';
                row.innerHTML = `
                    <td><input type="checkbox" class="user-checkbox" data-user-id="${user.id}" onchange="updateBatchButtons()"></td>
                    <td>${user.id}</td>
                    <td>${escapeHtml(user.username)}</td>
                    <td>${escapeHtml(user.email)}</td>
                    <td>
                        <span class="badge ${licValid ? 'bg-info' : 'bg-secondary'}">${planLabel}</span>
                        <br><small class="text-muted">${expiryStr}</small>
                    </td>
                    <td>${machineFp}</td>
                    <td>${bindingsHtml}</td>
                    <td>${keysHtml}</td>
                    <td>
                        <span class="badge ${user.is_active ? 'bg-success' : 'bg-danger'}">
                            ${user.is_active ? '活跃' : '非活跃'}
                        </span>
                    </td>
                    <td><small>${lastHb}</small></td>
                    <td>${formatDate(user.created_at)}</td>
                    <td>
                        <div class="table-actions">
                            <button class="btn btn-sm ${user.is_active ? 'btn-warning' : 'btn-success'}" 
                                onclick="toggleUserActive(${user.id}, ${user.is_active})"
                                title="${user.is_active ? '禁用此用户' : '重新启用此用户'}">
                                <i class="fas ${user.is_active ? 'fa-ban' : 'fa-check'}"></i> ${user.is_active ? '禁用' : '启用'}
                            </button>
                            <button class="btn btn-sm btn-info" 
                                onclick="showEditUserModal(${user.id})"
                                title="编辑用户">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button class="btn btn-sm btn-danger" 
                                onclick="showDeleteUserModal(this)" data-user-id="${user.id}" data-username="${escapeHtml(user.username)}"
                                title="删除用户">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </td>
                `;
                usersList.appendChild(row);
            });
            
            // 渲染分页
            renderUsersPagination(response.total, page, usersPageSize);
        } catch (error) {
            console.error('加载用户列表失败:', error);
            showError('加载用户列表失败: ' + error.message);
        }
    }

    // 渲染分页
    function renderUsersPagination(total, currentPage, pageSize) {
        const totalPages = Math.ceil(total / pageSize);
        const pagination = document.getElementById('users-pagination');
        pagination.innerHTML = '';
        
        // 上一页
        const prevItem = document.createElement('li');
        prevItem.className = `page-item ${currentPage <= 1 ? 'disabled' : ''}`;
        prevItem.innerHTML = `<a class="page-link" href="#" onclick="switchUserPage(${Math.max(1, currentPage - 1)})">上一页</a>`;
        pagination.appendChild(prevItem);
        
        // 页码
        for (let i = Math.max(1, currentPage - 2); i <= Math.min(totalPages, currentPage + 2); i++) {
            const pageItem = document.createElement('li');
            pageItem.className = `page-item ${i === currentPage ? 'active' : ''}`;
            pageItem.innerHTML = `<a class="page-link" href="#" onclick="switchUserPage(${i})">${i}</a>`;
            pagination.appendChild(pageItem);
        }
        
        // 下一页
        const nextItem = document.createElement('li');
        nextItem.className = `page-item ${currentPage >= totalPages ? 'disabled' : ''}`;
        nextItem.innerHTML = `<a class="page-link" href="#" onclick="switchUserPage(${Math.min(totalPages, currentPage + 1)})">下一页</a>`;
        pagination.appendChild(nextItem);
    }

    // 切换用户页面
    function switchUserPage(page) {
        usersCurrentPage = page;
        loadUsers(page);
    }

    // 切换用户状态
    async function toggleUserActive(userId, isActive) {
        try {
            const result = await apiRequest(`/api/admin/users/${userId}/toggle_active`, {
                method: 'POST'
            });
            
            if (isActive) {
                showSuccess('用户已禁用，其许可证已同步失效');
            } else {
                showSuccess('用户已重新启用，其许可证已同步恢复有效');
            }
            loadUsers(usersCurrentPage);
        } catch (error) {
            console.error('切换用户状态失败:', error);
            showError(`操作失败: ${error.message}`);
        }
    }

    // 显示添加用户模态框
    function showAddUserModal() {
        const modalBody = document.getElementById('commonModalBody');
        modalBody.innerHTML = `
            <form id="add-user-form">
                <div class="mb-3">
                    <label for="new-username" class="form-label">用户名</label>
                    <input type="text" class="form-control" id="new-username" required>
                </div>
                <div class="mb-3">
                    <label for="new-email" class="form-label">邮箱</label>
                    <input type="email" class="form-control" id="new-email" required>
                </div>
                <div class="mb-3">
                    <label for="new-password" class="form-label">密码</label>
                    <div class="input-group">
                        <input type="password" class="form-control" id="new-password" required minlength="6">
                        <button class="btn btn-outline-secondary toggle-pwd" type="button" tabindex="-1" title="显示/隐藏密码">&#128065;</button>
                    </div>
                    <small class="text-muted">至少6位</small>
                </div>
                <div class="mb-3">
                    <label for="new-role" class="form-label">角色</label>
                    <select class="form-select" id="new-role">
                        <option value="user">普通用户</option>
                        <option value="admin">管理员</option>
                    </select>
                </div>
                <hr>
                <div class="mb-3">
                    <label for="new-plan-type" class="form-label">会员类型</label>
                    <select class="form-select" id="new-plan-type">
                        <option value="">不设置（用户后续自行激活）</option>
                        <option value="trial_15d">试用（15天）</option>
                        <option value="monthly">月卡（30天）</option>
                        <option value="quarterly">季卡（90天）</option>
                        <option value="yearly">年卡（365天）</option>
                        <option value="lifetime">终身VIP</option>
                    </select>
                </div>
            </form>
        `;
        
        document.getElementById('commonModalLabel').textContent = '添加新用户';
        document.getElementById('confirmModalBtn').textContent = '添加';
        
        const modal = getCommonModal();
        modal.show();
        
        document.getElementById('confirmModalBtn').onclick = async function() {
            try {
                const password = document.getElementById('new-password').value;
                if (password.length < 6) {
                    showError('密码至少6位');
                    return;
                }

                const userData = {
                    username: document.getElementById('new-username').value,
                    email: document.getElementById('new-email').value,
                    password: password,
                    is_admin: document.getElementById('new-role').value === 'admin'
                };
                const planType = document.getElementById('new-plan-type').value;
                if (planType) {
                    userData.plan_type = planType;
                }
                
                await apiRequest('/api/admin/users', {
                    method: 'POST',
                    body: JSON.stringify(userData)
                });
                
                showSuccess('添加用户成功');
                modal.hide();
                loadUsers(usersCurrentPage);
            } catch (error) {
                console.error('添加用户失败:', error);
                showError(`添加用户失败: ${error.message}`);
            }
        };
    }

    // 显示编辑用户模态框
    async function showEditUserModal(userId) {
        try {
            const user = await apiRequest(`/api/admin/users/${userId}`);
            
            const modalBody = document.getElementById('commonModalBody');
            modalBody.innerHTML = `
                <form id="edit-user-form">
                    <div class="mb-3">
                        <label for="edit-username" class="form-label">用户名</label>
                        <input type="text" class="form-control" id="edit-username" value="${escapeHtml(user.username)}" required>
                    </div>
                    <div class="mb-3">
                        <label for="edit-email" class="form-label">邮箱</label>
                        <input type="email" class="form-control" id="edit-email" value="${escapeHtml(user.email)}" required>
                    </div>
                    ${currentUser && currentUser.id === userId ? `
                    <div class="alert alert-info py-1 px-2 mb-3" style="font-size:0.85em">
                        <i class="fas fa-info-circle"></i> 修改自己的密码请使用右上角"修改密码"按钮
                    </div>
                    ` : ''}
                    <div class="mb-3">
                        <label for="edit-password" class="form-label">新密码（留空则不修改${currentUser && currentUser.id === userId ? '，请使用右上角修改密码功能' : ''}）</label>
                        <div class="input-group">
                            <input type="password" class="form-control" id="edit-password" ${currentUser && currentUser.id === userId ? 'disabled' : ''}>
                            <button class="btn btn-outline-secondary toggle-pwd" type="button" tabindex="-1" title="显示/隐藏密码">&#128065;</button>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="edit-role" class="form-label">角色</label>
                        <select class="form-select" id="edit-role">
                            <option value="user" ${!user.is_admin ? 'selected' : ''}>普通用户</option>
                            <option value="admin" ${user.is_admin ? 'selected' : ''}>管理员</option>
                        </select>
                    </div>
                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" id="edit-active" ${user.is_active ? 'checked' : ''}>
                        <label class="form-check-label" for="edit-active">账户活跃</label>
                    </div>
                    <hr>
                    <div class="mb-3">
                        <label class="form-label fw-bold">会员管理</label>
                        <div class="mb-2">
                            <small class="text-muted">当前状态：
                                <span class="badge ${user.license_is_valid ? 'bg-info' : 'bg-secondary'}">${user.license_type === 'pro' ? '专业版' : (user.license_type === 'trial' ? '试用' : '未设置')}</span>
                                ${user.expiry_date ? '<span class="ms-1 text-muted">到期: ' + formatDate(user.expiry_date) + '</span>' : (user.license_type === 'pro' ? '<span class="ms-1 text-success">永久有效</span>' : '')}
                            </small>
                        </div>
                        <label for="edit-plan-type" class="form-label">变更会员类型</label>
                        <select class="form-select" id="edit-plan-type">
                            <option value="">不修改</option>
                            <option value="trial_15d">试用（15天）</option>
                            <option value="monthly">月卡（30天）</option>
                            <option value="quarterly">季卡（90天）</option>
                            <option value="yearly">年卡（365天）</option>
                            <option value="lifetime">终身VIP</option>
                        </select>
                        <small class="text-muted">选择后将叠加到现有有效期之上</small>
                    </div>
                    <div class="mb-3">
                        <label for="edit-expiry-date" class="form-label">自定义到期时间（UTC）</label>
                        <input type="datetime-local" class="form-control" id="edit-expiry-date">
                        <small class="text-muted">留空则不修改；请输入UTC时间，选择后将覆盖自动计算的到期时间</small>
                    </div>
                    <hr>
                    <div class="mb-3">
                        <label class="form-label fw-bold">设备心跳记录</label>
                        <div id="user-heartbeat-history" style="max-height:200px;overflow-y:auto;">
                            <small class="text-muted">加载中...</small>
                        </div>
                    </div>
                    <hr>
                    <div class="mb-3">
                        <label class="form-label fw-bold">绑定设备管理</label>
                        <div id="user-devices-list" style="max-height:200px;overflow-y:auto;">
                            <small class="text-muted">加载中...</small>
                        </div>
                    </div>
                </form>
            `;
            
            document.getElementById('commonModalLabel').textContent = '编辑用户';
            document.getElementById('confirmModalBtn').textContent = '保存';
            
            const modal = getCommonModal();
            modal.show();
            
            // 加载心跳历史
            loadUserHeartbeatHistory(userId);
            // 加载设备列表
            loadUserDevices(userId);
            
            document.getElementById('confirmModalBtn').onclick = async function() {
                try {
                    const newPassword = document.getElementById('edit-password').value;
                    
                    // 管理员不能通过用户管理接口修改自己的密码（后端会拒绝）
                    const isSelf = currentUser && currentUser.id === userId;
                    if (isSelf && newPassword) {
                        showError('请使用右上角"修改密码"按钮修改自己的密码');
                        return;
                    }
                    
                    // 非自己修改密码时，校验密码长度
                    if (newPassword && !isSelf) {
                        if (newPassword.length < 6) {
                            showError('密码至少6位');
                            return;
                        }
                    }
                    
                    const userData = {
                        username: document.getElementById('edit-username').value,
                        email: document.getElementById('edit-email').value,
                        is_admin: document.getElementById('edit-role').value === 'admin',
                        is_active: document.getElementById('edit-active').checked
                    };
                    
                    // 非自己修改密码
                    if (newPassword && !isSelf) {
                        userData.password = newPassword;
                    }
                    
                    const planType = document.getElementById('edit-plan-type').value;
                    if (planType) {
                        userData.plan_type = planType;
                    }
                    
                    const expiryDate = document.getElementById('edit-expiry-date').value;
                    if (expiryDate) {
                        // datetime-local返回本地时间如"2024-01-15T10:30"，追加秒和Z标记为UTC
                        userData.expiry_date = expiryDate + ':00Z';
                    }
                    
                    const result = await apiRequest(`/api/admin/users/${userId}`, {
                        method: 'PUT',
                        body: JSON.stringify(userData)
                    });
                    
                    showSuccess('更新用户成功');
                    modal.hide();
                    loadUsers(usersCurrentPage);
                } catch (error) {
                    console.error('更新用户失败:', error);
                    showError(`更新用户失败: ${error.message}`);
                }
            };
        } catch (error) {
            console.error('获取用户信息失败:', error);
            showError(`获取用户信息失败: ${error.message}`);
        }
    }

    // 显示删除用户模态框
    function showDeleteUserModal(btn) {
        let userId = btn.dataset.userId;
        let username = btn.dataset.username;
        const modalBody = document.getElementById('commonModalBody');
        modalBody.innerHTML = `
            <p>您确定要删除用户 "<strong>${escapeHtml(username)}</strong>" 吗？此操作不可撤销。</p>
        `;
        
        document.getElementById('commonModalLabel').textContent = '删除用户确认';
        document.getElementById('confirmModalBtn').textContent = '删除';
        
        const modal = getCommonModal();
        modal.show();
        
        document.getElementById('confirmModalBtn').onclick = async function() {
            try {
                await apiRequest(`/api/admin/users/${userId}`, {
                    method: 'DELETE'
                });
                
                showSuccess('删除用户成功');
                modal.hide();
                loadUsers(usersCurrentPage);
            } catch (error) {
                console.error('删除用户失败:', error);
                showError(`删除用户失败: ${error.message}`);
            }
        };
    }
    // 获取选中的用户ID
    function getSelectedUserIds() {
        return Array.from(document.querySelectorAll('.user-checkbox:checked')).map(cb => parseInt(cb.dataset.userId));
    }
    
    // 更新批量操作按钮显示状态
    function updateBatchButtons() {
        const ids = getSelectedUserIds();
        document.getElementById('batch-disable-btn').style.display = ids.length > 0 ? '' : 'none';
        document.getElementById('batch-enable-btn').style.display = ids.length > 0 ? '' : 'none';
    }
    
    // 批量切换用户状态
    async function batchToggleUsers(userIds, disable) {
        try {
            const result = await apiRequest('/api/admin/users/batch_status', {
                method: 'POST',
                body: JSON.stringify({ user_ids: userIds, is_active: !disable })
            });
            showSuccess(`${disable ? '禁用' : '启用'}完成：成功 ${result.success_count} 个${result.fail_count > 0 ? '，失败 ' + result.fail_count + ' 个' : ''}`);
        } catch (error) {
            showError(`${disable ? '禁用' : '启用'}失败: ${error.message}`);
        }
        loadUsers(usersCurrentPage);
    }
    
    // 加载用户心跳历史
    async function loadUserHeartbeatHistory(userId) {
        const container = document.getElementById('user-heartbeat-history');
        if (!container) return;
        try {
            const data = await apiRequest(`/api/admin/users/${userId}/heartbeat_history?page=1&page_size=10`);
            if (!data.logs || data.logs.length === 0) {
                container.innerHTML = '<small class="text-muted">暂无心跳记录</small>';
                return;
            }
            let html = '<table class="table table-sm table-bordered" style="font-size:0.8em"><thead><tr><th>时间</th><th>指纹</th><th>版本</th><th>IP</th></tr></thead><tbody>';
            data.logs.forEach(log => {
                const fp = log.fingerprint ? log.fingerprint.substring(0, 12) + '...' : '-';
                html += `<tr><td>${formatDate(log.created_at)}</td><td title="${escapeHtml(log.fingerprint || '')}">${fp}</td><td>${escapeHtml(log.app_version || '-')}</td><td>${escapeHtml(log.ip_address || '-')}</td></tr>`;
            });
            html += '</tbody></table>';
            if (data.total > 10) {
                html += `<small class="text-muted">共 ${data.total} 条记录，显示最近10条</small>`;
            }
            container.innerHTML = html;
        } catch (error) {
            container.innerHTML = '<small class="text-danger">加载失败</small>';
        }
    }

    // 加载用户绑定设备列表
    async function loadUserDevices(userId) {
        const container = document.getElementById('user-devices-list');
        if (!container) return;
        try {
            const data = await apiRequest(`/api/admin/users/${userId}/devices`);
            if (!data.devices || data.devices.length === 0) {
                container.innerHTML = '<small class="text-muted">暂无绑定设备</small>';
                return;
            }
            let html = `<small class="text-muted mb-2 d-block">已绑定 ${data.current_count}/${data.max_devices} 台设备</small>`;
            html += '<table class="table table-sm table-bordered" style="font-size:0.8em"><thead><tr><th>指纹</th><th>最后活跃</th><th>绑定时间</th><th>操作</th></tr></thead><tbody>';
            data.devices.forEach(d => {
                const fp = d.fingerprint ? d.fingerprint.substring(0, 16) + '...' : '-';
                html += `<tr><td title="${escapeHtml(d.fingerprint || '')}">${fp}</td><td>${formatDate(d.last_seen)}</td><td>${formatDate(d.created_at)}</td><td><button class="btn btn-sm btn-outline-danger" onclick="unbindDevice(${userId}, '${escapeHtml(d.fingerprint)}')">解绑</button></td></tr>`;
            });
            html += '</tbody></table>';
            container.innerHTML = html;
        } catch (error) {
            container.innerHTML = '<small class="text-danger">加载失败</small>';
        }
    }

    // 解绑设备
    async function unbindDevice(userId, fingerprint) {
        if (!confirm('确定要解绑此设备吗？解绑后该设备上的客户端将需要重新登录。')) return;
        try {
            const result = await apiRequest(`/api/admin/users/${userId}/unbind_device`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({fingerprint: fingerprint}),
            });
            if (result.success) {
                showSuccess('设备已解绑');
                loadUserDevices(userId);
            } else {
                showError(result.message || '解绑失败');
            }
        } catch (error) {
            showError('解绑失败: ' + error.message);
        }
    }
</script>
