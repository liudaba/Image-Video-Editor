<div class="page-header d-flex justify-content-between align-items-center">
    <div>
        <h2>仪表盘</h2>
        <p class="text-muted">系统概览和关键指标</p>
    </div>
    <div>
        <button id="cleanup-preview-btn" class="btn btn-outline-warning me-2">
            <i class="fas fa-search"></i> 查看垃圾
        </button>
        <button id="cleanup-btn" class="btn btn-danger">
            <i class="fas fa-trash-alt"></i> 一键清理垃圾
        </button>
    </div>
</div>

<div id="cleanup-preview-card" class="card shadow mb-4 d-none">
    <div class="card-header py-3 d-flex justify-content-between align-items-center">
        <h6 class="m-0 font-weight-bold text-warning"><i class="fas fa-exclamation-triangle me-1"></i>可清理垃圾预览</h6>
        <button class="btn-close" id="close-preview-btn"></button>
    </div>
    <div class="card-body" id="cleanup-preview-body">
        <div class="text-center"><div class="loading"></div><p class="mt-2">扫描中...</p></div>
    </div>
</div>

<div id="cleanup-result-card" class="card shadow mb-4 d-none">
    <div class="card-header py-3">
        <h6 class="m-0 font-weight-bold text-success"><i class="fas fa-check-circle me-1"></i>清理结果</h6>
    </div>
    <div class="card-body" id="cleanup-result-body">
    </div>
</div>

<div class="row mb-4">
    <div class="col-xl-3 col-md-6 mb-4">
        <div class="card stat-card border-start-primary shadow h-100 py-2">
            <div class="card-body">
                <div class="row no-gutters align-items-center">
                    <div class="col mr-2">
                        <div class="text-xs font-weight-bold text-primary text-uppercase mb-1">总用户数</div>
                        <div class="h5 mb-0 font-weight-bold text-gray-800"><span id="total-users">-</span></div>
                    </div>
                    <div class="col-auto">
                        <i class="fas fa-users fa-2x text-gray-300"></i>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="col-xl-3 col-md-6 mb-4">
        <div class="card stat-card border-start-success shadow h-100 py-2">
            <div class="card-body">
                <div class="row no-gutters align-items-center">
                    <div class="col mr-2">
                        <div class="text-xs font-weight-bold text-success text-uppercase mb-1">活跃许可证</div>
                        <div class="h5 mb-0 font-weight-bold text-gray-800"><span id="active-licenses">-</span></div>
                    </div>
                    <div class="col-auto">
                        <i class="fas fa-key fa-2x text-gray-300"></i>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="col-xl-3 col-md-6 mb-4">
        <div class="card stat-card border-start-info shadow h-100 py-2">
            <div class="card-body">
                <div class="row no-gutters align-items-center">
                    <div class="col mr-2">
                        <div class="text-xs font-weight-bold text-info text-uppercase mb-1">付费订单</div>
                        <div class="h5 mb-0 font-weight-bold text-gray-800"><span id="paid-orders">-</span></div>
                    </div>
                    <div class="col-auto">
                        <i class="fas fa-shopping-cart fa-2x text-gray-300"></i>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="col-xl-3 col-md-6 mb-4">
        <div class="card stat-card border-start-warning shadow h-100 py-2">
            <div class="card-body">
                <div class="row no-gutters align-items-center">
                    <div class="col mr-2">
                        <div class="text-xs font-weight-bold text-warning text-uppercase mb-1">总收入</div>
                        <div class="h5 mb-0 font-weight-bold text-gray-800">¥<span id="total-revenue">-</span></div>
                    </div>
                    <div class="col-auto">
                        <i class="fas fa-dollar-sign fa-2x text-gray-300"></i>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="row">
    <div class="col-lg-6 mb-4">
        <div class="card shadow mb-4">
            <div class="card-header py-3">
                <h6 class="m-0 font-weight-bold text-primary">最近用户</h6>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-bordered" id="recent-users-table" width="100%" cellspacing="0">
                        <thead>
                            <tr>
                                <th>用户名</th>
                                <th>邮箱</th>
                                <th>注册时间</th>
                            </tr>
                        </thead>
                        <tbody id="recent-users-list">
                            <!-- 动态加载 -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    
    <div class="col-lg-6 mb-4">
        <div class="card shadow mb-4">
            <div class="card-header py-3">
                <h6 class="m-0 font-weight-bold text-primary">近期订单</h6>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-bordered" id="recent-orders-table" width="100%" cellspacing="0">
                        <thead>
                            <tr>
                                <th>订单号</th>
                                <th>金额</th>
                                <th>状态</th>
                                <th>时间</th>
                            </tr>
                        </thead>
                        <tbody id="recent-orders-list">
                            <!-- 动态加载 -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    async function loadDashboardContent() {
        try {
            const stats = await apiRequest('/api/admin/stats');
            document.getElementById('total-users').textContent = stats.total_users;
            document.getElementById('active-licenses').textContent = stats.active_licenses;
            document.getElementById('paid-orders').textContent = stats.paid_orders;
            document.getElementById('total-revenue').textContent = stats.total_revenue.toFixed(2);

            const usersRes = await apiRequest('/api/admin/users?page=1&page_size=5');
            const usersList = document.getElementById('recent-users-list');
            usersList.innerHTML = '';
            
            usersRes.users.forEach(user => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${escapeHtml(user.username)}</td>
                    <td>${escapeHtml(user.email)}</td>
                    <td>${formatDate(user.created_at)}</td>
                `;
                usersList.appendChild(row);
            });

            const ordersRes = await apiRequest('/api/admin/orders?recent=5');
            const ordersList = document.getElementById('recent-orders-list');
            ordersList.innerHTML = '';
            
            if (ordersRes.orders && ordersRes.orders.length > 0) {
                ordersRes.orders.forEach(order => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${escapeHtml(order.order_no)}</td>
                        <td>¥${order.amount}</td>
                        <td>
                            <span class="badge ${
                                order.status === 'paid' ? 'bg-success' : 
                                order.status === 'pending' ? 'bg-warning' : 
                                order.status === 'cancelled' ? 'bg-secondary' : 'bg-danger'
                            }">${order.status_text}</span>
                        </td>
                        <td>${formatDate(order.created_at)}</td>
                    `;
                    ordersList.appendChild(row);
                });
            } else {
                const row = document.createElement('tr');
                row.innerHTML = '<td colspan="4" class="text-center">暂无订单数据</td>';
                ordersList.appendChild(row);
            }
        } catch (error) {
            console.error('加载仪表盘数据失败:', error);
            showError('加载仪表盘数据失败: ' + error.message);
        }

        setupCleanupButtons();
    }

    function setupCleanupButtons() {
        const previewBtn = document.getElementById('cleanup-preview-btn');
        const cleanupBtn = document.getElementById('cleanup-btn');
        const closePreviewBtn = document.getElementById('close-preview-btn');

        if (previewBtn) {
            previewBtn.addEventListener('click', loadCleanupPreview);
        }
        if (cleanupBtn) {
            cleanupBtn.addEventListener('click', executeCleanup);
        }
        if (closePreviewBtn) {
            closePreviewBtn.addEventListener('click', function() {
                document.getElementById('cleanup-preview-card').classList.add('d-none');
            });
        }
    }

    async function loadCleanupPreview() {
        const previewCard = document.getElementById('cleanup-preview-card');
        const previewBody = document.getElementById('cleanup-preview-body');
        previewCard.classList.remove('d-none');
        previewBody.innerHTML = '<div class="text-center"><div class="loading"></div><p class="mt-2">扫描中...</p></div>';

        try {
            const data = await apiRequest('/api/admin/cleanup/preview');
            let html = '<div class="row">';

            html += '<div class="col-md-6"><h6 class="mb-3"><i class="fas fa-database me-1"></i>数据库可清理项</h6><ul class="list-group">';
            const db = data.database;
            const dbItems = [
                { label: '审计日志 (>90天)', count: db.audit_logs_older_than_90d },
                { label: '支付通知日志 (>90天)', count: db.payment_logs_older_than_90d },
                { label: '过期/取消订单 (>30天)', count: db.expired_orders_older_than_30d },
                { label: '心跳日志 (>30天)', count: db.heartbeat_logs_older_than_30d },
            ];
            let totalDb = 0;
            dbItems.forEach(item => {
                totalDb += item.count;
                const badgeClass = item.count > 0 ? 'bg-warning' : 'bg-success';
                html += `<li class="list-group-item d-flex justify-content-between align-items-center">
                    ${item.label}
                    <span class="badge ${badgeClass}">${item.count} 条</span>
                </li>`;
            });
            html += `<li class="list-group-item d-flex justify-content-between align-items-center fw-bold">
                合计
                <span class="badge bg-primary">${totalDb} 条</span>
            </li>`;
            html += '</ul></div>';

            html += '<div class="col-md-6"><h6 class="mb-3"><i class="fab fa-docker me-1"></i>Docker 资源</h6>';
            if (data.docker_available) {
                html += '<div class="alert alert-success py-2"><i class="fas fa-check me-1"></i>Docker CLI 可用</div>';
                if (data.docker_disk_usage) {
                    html += '<pre class="bg-dark text-light p-3 rounded" style="font-size:0.8em;max-height:200px;overflow:auto;">' + escapeHtml(data.docker_disk_usage) + '</pre>';
                }
            } else {
                html += '<div class="alert alert-warning py-2"><i class="fas fa-exclamation-triangle me-1"></i>Docker CLI 不可用，Docker 清理功能将跳过</div>';
            }
            html += '</div>';

            html += '</div>';
            previewBody.innerHTML = html;
        } catch (error) {
            previewBody.innerHTML = `<div class="alert alert-danger">扫描失败: ${escapeHtml(error.message)}</div>`;
        }
    }

    async function executeCleanup() {
        const cleanupBtn = document.getElementById('cleanup-btn');
        const resultCard = document.getElementById('cleanup-result-card');
        const resultBody = document.getElementById('cleanup-result-body');

        if (!confirm('确定要执行一键清理吗？\n\n将清理：\n- 数据库过期日志和订单\n- Docker 无用容器、镜像、卷和构建缓存\n\n此操作不可撤销！')) {
            return;
        }

        cleanupBtn.disabled = true;
        cleanupBtn.innerHTML = '<span class="loading"></span> 清理中...';
        resultCard.classList.remove('d-none');
        resultBody.innerHTML = '<div class="text-center"><div class="loading"></div><p class="mt-2">正在清理，请稍候...</p></div>';

        try {
            const data = await apiRequest('/api/admin/cleanup', { method: 'POST' });

            let html = '<div class="row">';

            html += '<div class="col-md-6"><h6 class="mb-3"><i class="fas fa-database me-1 text-primary"></i>数据库清理结果</h6>';
            const db = data.database;
            if (db.error) {
                html += `<div class="alert alert-danger">清理失败: ${escapeHtml(db.error)}</div>`;
            } else {
                html += '<ul class="list-group">';
                const dbItems = [
                    { label: '审计日志', count: db.audit_logs || 0 },
                    { label: '支付通知日志', count: db.payment_notify_logs || 0 },
                    { label: '过期/取消订单', count: db.expired_orders || 0 },
                    { label: '心跳日志', count: db.heartbeat_logs || 0 },
                    { label: '过期许可证密钥', count: db.expired_license_keys || 0 },
                ];
                let totalDb = 0;
                dbItems.forEach(item => {
                    totalDb += item.count;
                    const badgeClass = item.count > 0 ? 'bg-info' : 'bg-secondary';
                    html += `<li class="list-group-item d-flex justify-content-between align-items-center">
                        ${item.label}
                        <span class="badge ${badgeClass}">删除 ${item.count} 条</span>
                    </li>`;
                });
                html += `<li class="list-group-item d-flex justify-content-between align-items-center fw-bold">
                    合计
                    <span class="badge bg-primary">删除 ${totalDb} 条</span>
                </li>`;
                html += '</ul>';
            }
            html += '</div>';

            html += '<div class="col-md-6"><h6 class="mb-3"><i class="fab fa-docker me-1 text-primary"></i>Docker 清理结果</h6>';
            const docker = data.docker;
            const dockerItems = [
                { key: 'containers', label: '停止的容器', icon: 'fa-box' },
                { key: 'images', label: '无用镜像', icon: 'fa-layer-group' },
                { key: 'volumes', label: '未使用卷', icon: 'fa-hard-drive' },
                { key: 'build_cache', label: '构建缓存', icon: 'fa-cogs' },
            ];
            html += '<ul class="list-group">';
            dockerItems.forEach(item => {
                const d = docker[item.key];
                if (d) {
                    const statusIcon = d.cleaned ? '<i class="fas fa-check-circle text-success me-1"></i>' : '<i class="fas fa-times-circle text-danger me-1"></i>';
                    html += `<li class="list-group-item">
                        ${statusIcon}<i class="fas ${item.icon} me-1"></i>${item.label}
                        ${d.cleaned ? '<span class="badge bg-success ms-2">已清理</span>' : '<span class="badge bg-danger ms-2">失败</span>'}
                        <small class="d-block text-muted mt-1" style="font-size:0.75em">${escapeHtml(d.detail || '')}</small>
                    </li>`;
                }
            });
            html += '</ul>';

            if (docker.disk_usage) {
                html += '<h6 class="mt-3 mb-2">当前 Docker 磁盘使用</h6>';
                html += '<pre class="bg-dark text-light p-3 rounded" style="font-size:0.8em;max-height:200px;overflow:auto;">' + escapeHtml(docker.disk_usage) + '</pre>';
            }
            html += '</div>';

            html += '</div>';
            resultBody.innerHTML = html;

            const previewCard = document.getElementById('cleanup-preview-card');
            if (previewCard) previewCard.classList.add('d-none');

        } catch (error) {
            resultBody.innerHTML = `<div class="alert alert-danger">清理失败: ${escapeHtml(error.message)}</div>`;
        } finally {
            cleanupBtn.disabled = false;
            cleanupBtn.innerHTML = '<i class="fas fa-trash-alt"></i> 一键清理垃圾';
        }
    }
</script>
