<div class="page-header">
    <h2>版本管理</h2>
    <p class="text-muted">管理应用程序版本和更新</p>
</div>

<div class="card shadow mb-4">
    <div class="card-header py-3 d-flex flex-row align-items-center justify-content-between">
        <h6 class="m-0 font-weight-bold text-primary">版本列表</h6>
        <button class="btn btn-sm btn-primary" id="add-version-btn">
            <i class="fas fa-plus"></i> 添加版本
        </button>
    </div>
    <div class="card-body">
        <div class="table-responsive">
            <table class="table table-bordered" id="versions-table" width="100%" cellspacing="0">
                <thead>
                    <tr>
                        <th>版本号</th>
                        <th>更新类型</th>
                        <th>发布日期</th>
                        <th>优先级</th>
                        <th>强制更新</th>
                        <th>状态</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="versions-list">
                    <!-- 动态加载 -->
                </tbody>
            </table>
        </div>
        <nav aria-label="版本列表分页" class="mt-3">
            <ul class="pagination justify-content-center" id="versions-pagination">
            </ul>
        </nav>
    </div>
</div>

<script>
    let versionsCurrentPage = 1;
    let versionsPageSize = 20;

    async function loadVersionsContent() {
        await loadVersions();
        
        document.getElementById('add-version-btn').addEventListener('click', () => {
            showAddVersionModal();
        });
    }

    async function loadVersions(page) {
        if (page !== undefined) versionsCurrentPage = page;
        try {
            const response = await apiRequest(`/api/admin/versions?page=${versionsCurrentPage}&page_size=${versionsPageSize}`);
            const versionsList = document.getElementById('versions-list');
            versionsList.innerHTML = '';
            
            response.versions.forEach(version => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><strong>${escapeHtml(version.version)}</strong></td>
                    <td>
                        <span class="badge ${version.update_type === 'patch' ? 'bg-info' : 'bg-primary'}">${version.update_type === 'patch' ? '增量补丁' : '全量更新'}</span>
                        ${version.update_type === 'patch' && version.from_version ? '<br><small class="text-muted">从 ' + escapeHtml(version.from_version) + '</small>' : ''}
                    </td>
                    <td>${formatDate(version.release_date)}</td>
                    <td>
                        <span class="badge ${
                            version.priority === 'critical' ? 'bg-danger' : 
                            version.priority === 'high' ? 'bg-warning' : 'bg-info'
                        }">${version.priority === 'critical' ? '紧急' : version.priority === 'high' ? '高' : '普通'}</span>
                    </td>
                    <td>${version.force_update ? '<i class="fas fa-check text-success"></i>' : '<i class="fas fa-times text-danger"></i>'}</td>
                    <td>
                        <span class="badge ${version.is_active ? 'bg-success' : 'bg-secondary'}">${version.is_active ? '启用' : '禁用'}</span>
                    </td>
                    <td>
                        <div class="table-actions">
                            <button class="btn btn-sm ${version.is_active ? 'btn-warning' : 'btn-success'}" 
                                onclick="toggleVersionActive(${version.id}, ${version.is_active})">
                                <i class="fas ${version.is_active ? 'fa-eye-slash' : 'fa-eye'}"></i>
                            </button>
                            <button class="btn btn-sm btn-info" onclick="showEditVersionModal(${version.id})">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button class="btn btn-sm btn-danger" onclick="showDeleteVersionModal(${version.id}, '${escapeHtml(version.version)}')">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </td>
                `;
                versionsList.appendChild(row);
            });

            // 渲染分页
            const totalPages = Math.ceil(response.total / versionsPageSize);
            renderVersionsPagination(versionsCurrentPage, totalPages);
        } catch (error) {
            console.error('加载版本列表失败:', error);
            showError('加载版本列表失败: ' + error.message);
        }
    }

    function renderVersionsPagination(currentPage, totalPages) {
        const container = document.getElementById('versions-pagination');
        if (!container) return;
        container.innerHTML = '';
        if (totalPages <= 1) return;

        const prevLi = document.createElement('li');
        prevLi.className = `page-item ${currentPage === 1 ? 'disabled' : ''}`;
        prevLi.innerHTML = `<a class="page-link" href="#">上一页</a>`;
        if (currentPage > 1) {
            prevLi.querySelector('a').addEventListener('click', (e) => { e.preventDefault(); loadVersions(currentPage - 1); });
        }
        container.appendChild(prevLi);

        for (let i = 1; i <= totalPages; i++) {
            const li = document.createElement('li');
            li.className = `page-item ${i === currentPage ? 'active' : ''}`;
            li.innerHTML = `<a class="page-link" href="#">${i}</a>`;
            if (i !== currentPage) {
                li.querySelector('a').addEventListener('click', (e) => { e.preventDefault(); loadVersions(i); });
            }
            container.appendChild(li);
        }

        const nextLi = document.createElement('li');
        nextLi.className = `page-item ${currentPage === totalPages ? 'disabled' : ''}`;
        nextLi.innerHTML = `<a class="page-link" href="#">下一页</a>`;
        if (currentPage < totalPages) {
            nextLi.querySelector('a').addEventListener('click', (e) => { e.preventDefault(); loadVersions(currentPage + 1); });
        }
        container.appendChild(nextLi);
    }

    function showAddVersionModal() {
        const modalBody = document.getElementById('commonModalBody');
        modalBody.innerHTML = `
            <form id="add-version-form">
                <div class="mb-3">
                    <label for="version-number" class="form-label">版本号</label>
                    <input type="text" class="form-control" id="version-number" placeholder="如: 2.1.0" required>
                </div>
                <div class="mb-3">
                    <label for="update-type" class="form-label">更新类型</label>
                    <select class="form-select" id="update-type" onchange="togglePatchFields()">
                        <option value="full">全量更新</option>
                        <option value="patch">增量补丁</option>
                    </select>
                </div>
                <div class="mb-3" id="from-version-group" style="display:none">
                    <label for="from-version" class="form-label">适用源版本</label>
                    <input type="text" class="form-control" id="from-version" placeholder="如: 2.0.0（补丁从此版本升级）">
                </div>
                <div class="mb-3">
                    <label for="download-url" class="form-label">全量安装包下载地址</label>
                    <input type="url" class="form-control" id="download-url" placeholder="https://...">
                </div>
                <div class="mb-3">
                    <label for="file-size" class="form-label">全量包大小 (字节)</label>
                    <input type="number" class="form-control" id="file-size" min="0">
                </div>
                <div class="mb-3">
                    <label for="file-hash" class="form-label">全量包哈希 (SHA256, 可选)</label>
                    <input type="text" class="form-control" id="file-hash" placeholder="SHA256哈希值，用于完整性校验">
                </div>
                <hr>
                <div class="mb-3" id="patch-fields">
                    <h6 class="text-muted">增量补丁信息（可选）</h6>
                    <div class="mb-3">
                        <label for="patch-url" class="form-label">补丁包下载地址</label>
                        <input type="url" class="form-control" id="patch-url" placeholder="补丁zip包的CDN地址">
                    </div>
                    <div class="mb-3">
                        <label for="patch-size" class="form-label">补丁包大小 (字节)</label>
                        <input type="number" class="form-control" id="patch-size" min="0">
                    </div>
                    <div class="mb-3">
                        <label for="patch-hash" class="form-label">补丁包哈希 (SHA256)</label>
                        <input type="text" class="form-control" id="patch-hash" placeholder="补丁包SHA256校验值">
                    </div>
                </div>
                <hr>
                <div class="mb-3">
                    <label for="changelog" class="form-label">更新日志</label>
                    <textarea class="form-control" id="changelog" rows="3"></textarea>
                </div>
                <div class="mb-3">
                    <label for="priority" class="form-label">优先级</label>
                    <select class="form-select" id="priority">
                        <option value="normal">普通</option>
                        <option value="high">高</option>
                        <option value="critical">紧急</option>
                    </select>
                </div>
                <div class="mb-3 form-check">
                    <input type="checkbox" class="form-check-input" id="force-update">
                    <label class="form-check-label" for="force-update">强制更新</label>
                </div>
            </form>
        `;
        
        document.getElementById('commonModalLabel').textContent = '添加新版本';
        document.getElementById('confirmModalBtn').textContent = '添加';
        
        const modal = getCommonModal();
        modal.show();
        
        document.getElementById('confirmModalBtn').onclick = async function() {
            try {
                const updateType = document.getElementById('update-type').value;
                const fromVersion = document.getElementById('from-version').value.trim();
                const patchUrl = document.getElementById('patch-url').value.trim();
                const downloadUrl = document.getElementById('download-url').value.trim();
                
                // 校验
                if (updateType === 'patch' && !fromVersion) {
                    showError('增量补丁类型必须填写适用源版本');
                    return;
                }
                if (!downloadUrl && !patchUrl) {
                    showError('至少需要提供全量包下载地址或补丁包下载地址');
                    return;
                }
                
                const changelogText = document.getElementById('changelog').value;
                const changelogLines = changelogText ? changelogText.split('\n').filter(l => l.trim()) : [];
                
                const data = {
                    version: document.getElementById('version-number').value,
                    update_type: updateType,
                    from_version: updateType === 'patch' ? fromVersion : null,
                    download_url: downloadUrl || null,
                    file_size: document.getElementById('file-size').value ? parseInt(document.getElementById('file-size').value) : null,
                    file_hash: document.getElementById('file-hash').value || null,
                    patch_url: patchUrl || null,
                    patch_size: document.getElementById('patch-size').value ? parseInt(document.getElementById('patch-size').value) : null,
                    patch_hash: document.getElementById('patch-hash').value || null,
                    changelog: changelogLines,
                    priority: document.getElementById('priority').value,
                    force_update: document.getElementById('force-update').checked
                };
                
                await apiRequest('/api/admin/versions', {
                    method: 'POST',
                    body: JSON.stringify(data)
                });
                
                showSuccess('添加版本成功');
                modal.hide();
                loadVersions();
            } catch (error) {
                console.error('添加版本失败:', error);
                showError(`添加版本失败: ${error.message}`);
            }
        };
    }

    async function showEditVersionModal(versionId) {
        try {
            const version = await apiRequest(`/api/admin/versions/${versionId}`);
            
            const modalBody = document.getElementById('commonModalBody');
            modalBody.innerHTML = `
                <form id="edit-version-form">
                    <div class="mb-3">
                        <label for="edit-version-number" class="form-label">版本号</label>
                        <input type="text" class="form-control" id="edit-version-number" value="${escapeHtml(version.version)}" required>
                    </div>
                    <div class="mb-3">
                        <label for="edit-update-type" class="form-label">更新类型</label>
                        <select class="form-select" id="edit-update-type" onchange="toggleEditPatchFields()">
                            <option value="full" ${version.update_type !== 'patch' ? 'selected' : ''}>全量更新</option>
                            <option value="patch" ${version.update_type === 'patch' ? 'selected' : ''}>增量补丁</option>
                        </select>
                    </div>
                    <div class="mb-3" id="edit-from-version-group" style="display:${version.update_type === 'patch' ? 'block' : 'none'}">
                        <label for="edit-from-version" class="form-label">适用源版本</label>
                        <input type="text" class="form-control" id="edit-from-version" value="${escapeHtml(version.from_version || '')}" placeholder="如: 2.0.0">
                    </div>
                    <div class="mb-3">
                        <label for="edit-download-url" class="form-label">全量安装包下载地址</label>
                        <input type="url" class="form-control" id="edit-download-url" value="${escapeHtml(version.download_url || '')}" placeholder="https://...">
                    </div>
                    <div class="mb-3">
                        <label for="edit-file-size" class="form-label">全量包大小 (字节)</label>
                        <input type="number" class="form-control" id="edit-file-size" value="${version.file_size || ''}" min="0">
                    </div>
                    <div class="mb-3">
                        <label for="edit-file-hash" class="form-label">全量包哈希 (SHA256, 可选)</label>
                        <input type="text" class="form-control" id="edit-file-hash" value="${escapeHtml(version.file_hash || '')}" placeholder="SHA256哈希值，用于完整性校验">
                    </div>
                    <hr>
                    <div class="mb-3">
                        <h6 class="text-muted">增量补丁信息（可选）</h6>
                        <div class="mb-3">
                            <label for="edit-patch-url" class="form-label">补丁包下载地址</label>
                            <input type="url" class="form-control" id="edit-patch-url" value="${escapeHtml(version.patch_url || '')}" placeholder="补丁zip包的CDN地址">
                        </div>
                        <div class="mb-3">
                            <label for="edit-patch-size" class="form-label">补丁包大小 (字节)</label>
                            <input type="number" class="form-control" id="edit-patch-size" value="${version.patch_size || ''}" min="0">
                        </div>
                        <div class="mb-3">
                            <label for="edit-patch-hash" class="form-label">补丁包哈希 (SHA256)</label>
                            <input type="text" class="form-control" id="edit-patch-hash" value="${escapeHtml(version.patch_hash || '')}" placeholder="补丁包SHA256校验值">
                        </div>
                    </div>
                    <hr>
                    <div class="mb-3">
                        <label for="edit-changelog" class="form-label">更新日志</label>
                        <textarea class="form-control" id="edit-changelog" rows="3">${escapeHtml(Array.isArray(version.changelog) ? version.changelog.join('\n') : (version.changelog || ''))}</textarea>
                    </div>
                    <div class="mb-3">
                        <label for="edit-priority" class="form-label">优先级</label>
                        <select class="form-select" id="edit-priority">
                            <option value="normal" ${version.priority === 'normal' ? 'selected' : ''}>普通</option>
                            <option value="high" ${version.priority === 'high' ? 'selected' : ''}>高</option>
                            <option value="critical" ${version.priority === 'critical' ? 'selected' : ''}>紧急</option>
                        </select>
                    </div>
                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" id="edit-force-update" ${version.force_update ? 'checked' : ''}>
                        <label class="form-check-label" for="edit-force-update">强制更新</label>
                    </div>
                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" id="edit-is-active" ${version.is_active ? 'checked' : ''}>
                        <label class="form-check-label" for="edit-is-active">启用版本</label>
                    </div>
                </form>
            `;
            
            document.getElementById('commonModalLabel').textContent = '编辑版本';
            document.getElementById('confirmModalBtn').textContent = '保存';
            
            const modal = getCommonModal();
            modal.show();
            
            document.getElementById('confirmModalBtn').onclick = async function() {
                try {
                    const updateType = document.getElementById('edit-update-type').value;
                    const fromVersion = document.getElementById('edit-from-version').value.trim();
                    const patchUrl = document.getElementById('edit-patch-url').value.trim();
                    const downloadUrl = document.getElementById('edit-download-url').value.trim();
                    
                    // 校验
                    if (updateType === 'patch' && !fromVersion) {
                        showError('增量补丁类型必须填写适用源版本');
                        return;
                    }
                    if (!downloadUrl && !patchUrl) {
                        showError('至少需要提供全量包下载地址或补丁包下载地址');
                        return;
                    }
                    
                    const changelogText = document.getElementById('edit-changelog').value;
                    const changelogLines = changelogText ? changelogText.split('\n').filter(l => l.trim()) : [];
                    
                    const data = {
                        version: document.getElementById('edit-version-number').value,
                        update_type: updateType,
                        from_version: updateType === 'patch' ? fromVersion : null,
                        download_url: downloadUrl || null,
                        file_size: document.getElementById('edit-file-size').value ? parseInt(document.getElementById('edit-file-size').value) : null,
                        file_hash: document.getElementById('edit-file-hash').value || null,
                        patch_url: patchUrl || null,
                        patch_size: document.getElementById('edit-patch-size').value ? parseInt(document.getElementById('edit-patch-size').value) : null,
                        patch_hash: document.getElementById('edit-patch-hash').value || null,
                        changelog: changelogLines,
                        priority: document.getElementById('edit-priority').value,
                        force_update: document.getElementById('edit-force-update').checked,
                        is_active: document.getElementById('edit-is-active').checked
                    };
                    
                    await apiRequest(`/api/admin/versions/${versionId}`, {
                        method: 'PUT',
                        body: JSON.stringify(data)
                    });
                    
                    showSuccess('更新版本成功');
                    modal.hide();
                    loadVersions();
                } catch (error) {
                    console.error('更新版本失败:', error);
                    showError(`更新版本失败: ${error.message}`);
                }
            };
        } catch (error) {
            console.error('获取版本信息失败:', error);
            showError(`获取版本信息失败: ${error.message}`);
        }
    }

    async function toggleVersionActive(versionId, isActive) {
        try {
            await apiRequest(`/api/admin/versions/${versionId}/toggle_active`, {
                method: 'POST'
            });
            showSuccess(`${isActive ? '禁用' : '启用'}版本成功`);
            loadVersions();
        } catch (error) {
            console.error('切换版本状态失败:', error);
            showError(`切换版本状态失败: ${error.message}`);
        }
    }

    function showDeleteVersionModal(versionId, versionName) {
        const modalBody = document.getElementById('commonModalBody');
        modalBody.innerHTML = `
            <p>您确定要删除版本 "<strong>${escapeHtml(versionName)}</strong>" 吗？此操作不可撤销。</p>
        `;
        
        document.getElementById('commonModalLabel').textContent = '删除版本确认';
        document.getElementById('confirmModalBtn').textContent = '删除';
        
        const modal = getCommonModal();
        modal.show();
        
        document.getElementById('confirmModalBtn').onclick = async function() {
            try {
                await apiRequest(`/api/admin/versions/${versionId}`, {
                    method: 'DELETE'
                });
                
                showSuccess('删除版本成功');
                modal.hide();
                loadVersions();
            } catch (error) {
                console.error('删除版本失败:', error);
                showError(`删除版本失败: ${error.message}`);
            }
        };
    }

    function togglePatchFields() {
        const updateType = document.getElementById('update-type').value;
        const fromVersionGroup = document.getElementById('from-version-group');
        if (fromVersionGroup) {
            fromVersionGroup.style.display = updateType === 'patch' ? 'block' : 'none';
        }
    }

    function toggleEditPatchFields() {
        const updateType = document.getElementById('edit-update-type').value;
        const fromVersionGroup = document.getElementById('edit-from-version-group');
        if (fromVersionGroup) {
            fromVersionGroup.style.display = updateType === 'patch' ? 'block' : 'none';
        }
    }
</script>
