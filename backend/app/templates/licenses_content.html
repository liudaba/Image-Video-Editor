<div class="page-header">
    <h2>许可证管理</h2>
    <p class="text-muted">管理系统中的许可证密钥和用户许可证</p>
</div>

<ul class="nav nav-tabs" id="licenseTabs" role="tablist">
    <li class="nav-item" role="presentation">
        <button class="nav-link active" id="keys-tab" data-bs-toggle="tab" data-bs-target="#keys" type="button">许可证密钥</button>
    </li>
    <li class="nav-item" role="presentation">
        <button class="nav-link" id="user-licenses-tab" data-bs-toggle="tab" data-bs-target="#user-licenses" type="button">用户许可证</button>
    </li>
</ul>

<div class="tab-content" id="licenseTabsContent">
    <div class="tab-pane fade show active" id="keys" role="tabpanel">
        <div class="card shadow mt-4">
            <div class="card-header py-3 d-flex flex-row align-items-center justify-content-between">
                <h6 class="m-0 font-weight-bold text-primary">许可证密钥列表</h6>
                <button class="btn btn-sm btn-primary" id="generate-keys-btn">
                    <i class="fas fa-plus"></i> 生成密钥
                </button>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-bordered" id="license-keys-table" width="100%" cellspacing="0">
                        <thead>
                            <tr>
                                <th>密钥</th>
                                <th>套餐类型</th>
                                <th>状态</th>
                                <th>激活用户</th>
                                <th>激活用户邮箱</th>
                                <th>激活时间</th>
                                <th>到期时间</th>
                                <th>创建时间</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="license-keys-list">
                            <!-- 动态加载 -->
                        </tbody>
                    </table>
                </div>
                <nav aria-label="许可证密钥分页" class="mt-3">
                    <ul class="pagination justify-content-center" id="keys-pagination">
                        <!-- 分页按钮 -->
                    </ul>
                </nav>
            </div>
        </div>
    </div>
    
    <div class="tab-pane fade" id="user-licenses" role="tabpanel">
        <div class="card shadow mt-4">
            <div class="card-header py-3">
                <h6 class="m-0 font-weight-bold text-primary">用户许可证列表</h6>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-bordered" id="user-licenses-table" width="100%" cellspacing="0">
                        <thead>
                            <tr>
                                <th>用户ID</th>
                                <th>用户名</th>
                                <th>邮箱</th>
                                <th>套餐类型</th>
                                <th>激活密钥</th>
                                <th>状态</th>
                                <th>到期时间</th>
                                <th>机器指纹</th>
                                <th>最后心跳</th>
                                <th>创建时间</th>
                            </tr>
                        </thead>
                        <tbody id="user-licenses-list">
                            <!-- 动态加载 -->
                        </tbody>
                    </table>
                </div>
                <nav aria-label="用户许可证分页" class="mt-3">
                    <ul class="pagination justify-content-center" id="user-licenses-pagination">
                        <!-- 分页按钮 -->
                    </ul>
                </nav>
            </div>
        </div>
    </div>
</div>

<script>
    // 分页状态
    let keysCurrentPage = 1;
    let keysPageSize = 20;
    let userLicensesCurrentPage = 1;
    let userLicensesPageSize = 20;

    async function loadLicensesContent() {
        document.getElementById('generate-keys-btn').addEventListener('click', () => {
            showGenerateKeysModal();
        });
        await loadLicenseKeys();
        await loadUserLicenses();
    }

    // 通用分页渲染函数
    function renderPagination(containerId, currentPage, totalPages, onPageChange) {
        const container = document.getElementById(containerId);
        if (!container) return;
        container.innerHTML = '';
        if (totalPages <= 1) return;

        const maxVisible = 5;
        let startPage = Math.max(1, currentPage - Math.floor(maxVisible / 2));
        let endPage = Math.min(totalPages, startPage + maxVisible - 1);
        if (endPage - startPage + 1 < maxVisible) {
            startPage = Math.max(1, endPage - maxVisible + 1);
        }

        // 上一页
        const prevLi = document.createElement('li');
        prevLi.className = `page-item ${currentPage === 1 ? 'disabled' : ''}`;
        prevLi.innerHTML = `<a class="page-link" href="#">上一页</a>`;
        if (currentPage > 1) {
            prevLi.querySelector('a').addEventListener('click', (e) => { e.preventDefault(); onPageChange(currentPage - 1); });
        }
        container.appendChild(prevLi);

        // 第一页
        if (startPage > 1) {
            const li = document.createElement('li');
            li.className = 'page-item';
            li.innerHTML = `<a class="page-link" href="#">1</a>`;
            li.querySelector('a').addEventListener('click', (e) => { e.preventDefault(); onPageChange(1); });
            container.appendChild(li);
            if (startPage > 2) {
                const dots = document.createElement('li');
                dots.className = 'page-item disabled';
                dots.innerHTML = `<span class="page-link">...</span>`;
                container.appendChild(dots);
            }
        }

        // 页码
        for (let i = startPage; i <= endPage; i++) {
            const li = document.createElement('li');
            li.className = `page-item ${i === currentPage ? 'active' : ''}`;
            li.innerHTML = `<a class="page-link" href="#">${i}</a>`;
            if (i !== currentPage) {
                li.querySelector('a').addEventListener('click', (e) => { e.preventDefault(); onPageChange(i); });
            }
            container.appendChild(li);
        }

        // 最后一页
        if (endPage < totalPages) {
            if (endPage < totalPages - 1) {
                const dots = document.createElement('li');
                dots.className = 'page-item disabled';
                dots.innerHTML = `<span class="page-link">...</span>`;
                container.appendChild(dots);
            }
            const li = document.createElement('li');
            li.className = 'page-item';
            li.innerHTML = `<a class="page-link" href="#">${totalPages}</a>`;
            li.querySelector('a').addEventListener('click', (e) => { e.preventDefault(); onPageChange(totalPages); });
            container.appendChild(li);
        }

        // 下一页
        const nextLi = document.createElement('li');
        nextLi.className = `page-item ${currentPage === totalPages ? 'disabled' : ''}`;
        nextLi.innerHTML = `<a class="page-link" href="#">下一页</a>`;
        if (currentPage < totalPages) {
            nextLi.querySelector('a').addEventListener('click', (e) => { e.preventDefault(); onPageChange(currentPage + 1); });
        }
        container.appendChild(nextLi);
    }

    async function loadLicenseKeys(page) {
        if (page !== undefined) keysCurrentPage = page;
        try {
            const response = await apiRequest(`/api/admin/license_keys?page=${keysCurrentPage}&page_size=${keysPageSize}`);
            const keysList = document.getElementById('license-keys-list');
            keysList.innerHTML = '';
            
            response.keys.forEach(key => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><code>${escapeHtml(key.license_key)}</code></td>
                    <td>${key.plan_type === 'monthly' ? '月付' : key.plan_type === 'quarterly' ? '季付' : key.plan_type === 'yearly' ? '年付' : key.plan_type === 'lifetime' ? '终身' : key.plan_type === 'trial_15d' ? '试用15天' : key.plan_type}</td>
                    <td>
                        <span class="badge ${
                            key.is_expired ? 'bg-warning text-dark' :
                            key.status === 'unused' ? 'bg-secondary' : 
                            key.status === 'activated' ? 'bg-success' : 'bg-danger'
                        }">${key.is_expired ? '已过期' : key.status === 'unused' ? '未使用' : key.status === 'activated' ? '已激活' : '已撤销'}</span>
                    </td>
                    <td>${escapeHtml(key.activated_by_username) || '-'}</td>
                    <td>${escapeHtml(key.activated_by_email) || '-'}</td>
                    <td>${key.activated_at ? formatDate(key.activated_at) : '-'}</td>
                    <td>${key.expiry_date ? formatDate(key.expiry_date) : (key.plan_type === 'lifetime' ? '永久' : '-')}</td>
                    <td>${formatDate(key.created_at)}</td>
                    <td>
                        ${key.status === 'unused' || key.status === 'activated' ? `
                            <button class="btn btn-sm btn-danger" onclick="revokeKey('${escapeHtml(key.license_key)}')">
                                <i class="fas fa-ban"></i> 撤销
                            </button>
                        ` : ''}
                        ${key.status !== 'activated' ? `
                            <button class="btn btn-sm btn-outline-danger" onclick="deleteKey('${escapeHtml(key.license_key)}')">
                                <i class="fas fa-trash"></i> 删除
                            </button>
                        ` : ''}
                    </td>
                `;
                keysList.appendChild(row);
            });

            // 渲染分页
            const totalPages = Math.ceil(response.total / keysPageSize);
            renderPagination('keys-pagination', keysCurrentPage, totalPages, (p) => loadLicenseKeys(p));
        } catch (error) {
            console.error('加载许可证密钥失败:', error);
            showError('加载许可证密钥失败: ' + error.message);
        }
    }

    async function loadUserLicenses(page) {
        if (page !== undefined) userLicensesCurrentPage = page;
        try {
            const response = await apiRequest(`/api/admin/user_licenses?page=${userLicensesCurrentPage}&page_size=${userLicensesPageSize}`);
            const licensesList = document.getElementById('user-licenses-list');
            licensesList.innerHTML = '';
            
            response.licenses.forEach(license => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${license.user_id}</td>
                    <td>${escapeHtml(license.username)}</td>
                    <td>${escapeHtml(license.email) || '-'}</td>
                    <td><span class="badge ${license.plan_type === 'lifetime' ? 'bg-warning' : license.plan_type === 'yearly' ? 'bg-primary' : license.plan_type === 'quarterly' ? 'bg-info' : license.plan_type === 'monthly' ? 'bg-success' : 'bg-secondary'}">${license.plan_type === 'monthly' ? '月付' : license.plan_type === 'quarterly' ? '季付' : license.plan_type === 'yearly' ? '年付' : license.plan_type === 'lifetime' ? '终身' : license.plan_type === 'trial_15d' ? '试用15天' : license.license_type === 'pro' ? '专业版' : '试用'}</span></td>
                    <td>${license.license_key ? `<code>${escapeHtml(license.license_key)}</code>` : '-'}</td>
                    <td><span class="badge ${license.is_valid ? 'bg-success' : 'bg-danger'}">${license.is_valid ? '有效' : '无效'}</span></td>
                    <td>${license.expiry_date ? formatDate(license.expiry_date) : (license.plan_type === 'lifetime' ? '永久' : '-')}</td>
                    <td>${license.machine_fingerprint ? `<small title="${escapeHtml(license.machine_fingerprint)}">${escapeHtml(license.machine_fingerprint.substring(0, 16))}...</small>` : '-'}</td>
                    <td>${license.last_heartbeat ? formatDate(license.last_heartbeat) : '-'}</td>
                    <td>${formatDate(license.created_at)}</td>
                `;
                licensesList.appendChild(row);
            });

            // 渲染分页
            const totalPages = Math.ceil(response.total / userLicensesPageSize);
            renderPagination('user-licenses-pagination', userLicensesCurrentPage, totalPages, (p) => loadUserLicenses(p));
        } catch (error) {
            console.error('加载用户许可证失败:', error);
            showError('加载用户许可证失败: ' + error.message);
        }
    }

    function showGenerateKeysModal() {
        const modalBody = document.getElementById('commonModalBody');
        modalBody.innerHTML = `
            <form id="generate-keys-form">
                <div class="mb-3">
                    <label for="key-count" class="form-label">生成数量</label>
                    <input type="number" class="form-control" id="key-count" value="1" min="1" max="50">
                </div>
                <div class="mb-3">
                    <label for="key-plan" class="form-label">套餐类型</label>
                    <select class="form-select" id="key-plan">
                        <option value="monthly">月付</option>
                        <option value="quarterly">季付</option>
                        <option value="yearly" selected>年付</option>
                        <option value="lifetime">终身</option>
                        <option value="trial_15d">试用15天</option>
                    </select>
                </div>
            </form>
        `;
        
        document.getElementById('commonModalLabel').textContent = '生成许可证密钥';
        document.getElementById('confirmModalBtn').textContent = '生成';
        
        const modal = new bootstrap.Modal(document.getElementById('commonModal'));
        modal.show();
        
        document.getElementById('confirmModalBtn').onclick = async function() {
            try {
                const data = {
                    count: parseInt(document.getElementById('key-count').value),
                    plan_type: document.getElementById('key-plan').value
                };
                
                const result = await apiRequest('/api/admin/generate_license_keys', {
                    method: 'POST',
                    body: JSON.stringify(data)
                });
                
                showSuccess(`成功生成 ${data.count} 个许可证密钥`);

                let keyList = result.keys.join('\n');
                let keysDisplay = document.getElementById('generatedKeysDisplay');
                if (!keysDisplay) {
                    keysDisplay = document.createElement('pre');
                    keysDisplay.id = 'generatedKeysDisplay';
                    keysDisplay.className = 'mt-3 p-3 bg-light border rounded';
                    keysDisplay.style.maxHeight = '200px';
                    keysDisplay.style.overflow = 'auto';
                    keysDisplay.style.whiteSpace = 'pre-wrap';
                    keysDisplay.style.wordBreak = 'break-all';
                    let modalBodyEl = document.querySelector('#commonModal .modal-body');
                    if (modalBodyEl) modalBodyEl.appendChild(keysDisplay);
                }
                keysDisplay.textContent = keyList;

                document.getElementById('confirmModalBtn').textContent = '关闭';
                document.getElementById('confirmModalBtn').onclick = function() {
                    modal.hide();
                    loadLicenseKeys();
                };
            } catch (error) {
                console.error('生成许可证密钥失败:', error);
                showError(`生成许可证密钥失败: ${error.message}`);
            }
        };
    }

    async function revokeKey(key) {
        if (!confirm(`确定要撤销密钥 ${key} 吗？`)) return;
        
        try {
            await apiRequest(`/api/admin/license_keys/${key}/revoke`, {
                method: 'POST'
            });
            showSuccess('撤销成功');
            loadLicenseKeys();
        } catch (error) {
            console.error('撤销密钥失败:', error);
            showError(`撤销密钥失败: ${error.message}`);
        }
    }

    async function deleteKey(key) {
        if (!confirm(`确定要删除密钥 ${key} 吗？此操作不可恢复！`)) return;
        
        try {
            await apiRequest(`/api/admin/license_keys/${key}`, {
                method: 'DELETE'
            });
            showSuccess('删除成功');
            loadLicenseKeys();
        } catch (error) {
            console.error('删除密钥失败:', error);
            showError(`删除密钥失败: ${error.message}`);
        }
    }
</script>
